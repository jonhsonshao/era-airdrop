<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ERA 空投领取</title>
<!-- 改用 TP 完美兼容的 ethers v5 -->
<script src="https://cdn.jsdelivr.net/npm/ethers@5.7.2/dist/ethers.umd.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:system-ui}
body{max-width:420px;margin:40px auto;padding:0 20px;background:#f5f7fa}
.box{background:#fff;padding:30px;border-radius:18px;box-shadow:0 6px 16px rgba(0,0,0,0.05)}
h2{margin-bottom:10px}
.desc{color:#666;margin-bottom:30px;font-size:14px}
.btn{width:100%;padding:18px;border-radius:14px;background:#007bff;color:white;border:none;font-size:16px;font-weight:bold}
.btn:disabled{background:#ccc}
#tip{margin-top:20px;font-size:14px;min-height:20px}
</style>
</head>
<body>

<div class="box">
  <h2>NewEra (ERA) 空投</h2>
  <p class="desc">每24小时1次 · 最多100次 · 每次1枚</p>
  <button id="claimBtn" class="btn">立即领取</button>
  <div id="tip"></div>
</div>

<script>
// ========== 只改这里 ==========
const AIRDROP_CONTRACT = "0xeCA3C2EE3D44a9D30702396813D5A8d9e7ab616D";
// ==============================

const ABI = [{"inputs":[],"name":"claimAirdrop","outputs":[],"stateMutability":"payable","type":"function"}];
const FEE = ethers.utils.parseEther("0.0005");
const BSC_CHAIN_ID = 56;

let provider, signer, contract;

// 延迟加载，兼容 TP 钱包注入慢
window.onload = async function() {
  if(!window.ethereum) {
    document.getElementById("tip").innerText = "请在 TP 钱包内置浏览器打开";
    return;
  }

  // 初始化
  provider = new ethers.providers.Web3Provider(window.ethereum);
  const chainId = await provider.getNetwork().then(n=>n.chainId);
  if(chainId !== BSC_CHAIN_ID) {
    document.getElementById("tip").innerText = "请切换到 BSC 主网";
  }
};

// 领取逻辑（TP 专用稳定版）
document.getElementById("claimBtn").onclick = async () => {
  const btn = document.getElementById("claimBtn");
  const tip = document.getElementById("tip");
  
  if(!window.ethereum) {
    tip.innerText = "❌ 请在 TP 钱包内打开";
    return;
  }

  btn.disabled = true;
  btn.innerText = "处理中...";
  tip.innerText = "正在连接钱包...";

  try {
    // 连接钱包
    await window.ethereum.request({method:"eth_requestAccounts"});
    const provider = new ethers.providers.Web3Provider(window.ethereum);
    const signer = provider.getSigner();
    const contract = new ethers.Contract(AIRDROP_CONTRACT, ABI, signer);

    tip.innerText = "正在发送交易...";
    
    // 核心：自动携带 0.0005 BNB
    const tx = await contract.claimAirdrop({
      value: FEE,
      gasLimit: 150000
    });

    tip.innerText = "交易上链中：" + tx.hash.substr(0, 18) + "...";
    await tx.wait();
    tip.innerText = "✅ 领取成功！";

  } catch(e) {
    console.error(e);
    tip.innerText = "❌ 失败：" + (e.message || "请检查冷却/余额").substr(0, 50);
  } finally {
    btn.disabled = false;
    btn.innerText = "立即领取";
  }
};
</script>
</body>
</html>
